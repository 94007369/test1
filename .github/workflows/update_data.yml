name: 自动更新情报数据

on:
  schedule:
    - cron: '0 */8 * * *'  # 每 8 小时触发一次 (UTC 时间)
  workflow_dispatch:      

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      # 1. 升级到 v4，支持更高版本的 Node.js
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 2. 升级到 v5，支持更高版本的 Node.js
      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: |
          pip install -r requirements.txt

      - name: 运行抓取脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python monitor01.py  

      - name: 提交并推送数据库更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add war_archive.db
          git commit -m "自动更新数据库: $(date)" || echo "No changes to commit"
          git push